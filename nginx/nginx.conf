# nginx: HLS-сервер видео с защитой от хотлинкинга (secure_link).
# Генерит подписанные ссылки на .m3u8/.ts с истечением срока.

server {
    listen 443 ssl;
    server_name video.ТВОЙ-ДОМЕН.tld;

    location /video/ {
        # secure_link: token из query (?token=...) и expires (?expires=...)
        secure_link $arg_token,$arg_expires;
        secure_link_md5 "СЕКРЕТ$uri$arg_expires";

        if ($secure_link = "") { return 403; }
        if ($secure_link = "0") { return 410; }  # ссылка протухла

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        root /srv/dj-school/video;
        add_header Cache-Control no-cache;
    }
}

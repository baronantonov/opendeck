# ============================================================
# Open Deck DJ School — nginx HLS-сервер (для Oracle Free VPS)
# Защита: secure_link (подписанные ссылки + срок жизни) + CORS
# только для твоего домена. Без валидного токена — 403/410.
# ============================================================

# Редирект http -> https
server {
    listen 80;
    server_name video.TVOY-DOMEN.tld;
    # certbot ставит сюда файлы для подтверждения домена:
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name video.TVOY-DOMEN.tld;

    ssl_certificate     /etc/letsencrypt/live/video.TVOY-DOMEN.tld/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/video.TVOY-DOMEN.tld/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # ---------- Видео HLS с защитой ----------
    location /video/ {
        # secure_link: token из ?md5=... и срок из ?expires=...
        secure_link $arg_md5,$arg_expires;
        secure_link_md5 "OPENDECK_SECRET$uri$arg_expires";

        if ($secure_link = "") { return 403; }       # нет/плохой токен
        if ($secure_link = "0") { return 410; }       # ссылка протухла

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        root /srv/dj-school/video;
        add_header Cache-Control "no-store";
        # Разрешаем встраивание только из твоего приложения
        add_header Access-Control-Allow-Origin "https://video.TVOY-DOMEN.tld" always;
    }

    # ---------- Отдача самого приложения (TMA) ----------
    location / {
        root /srv/dj-school/miniapp;
        index index.html;
        # SPA: при обновлении страницы отдавать index.html
        try_files $uri $uri/ /index.html;
    }
}
